<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del libro — BeeRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Fondo hexagonal -->
<div class="hex-bg" aria-hidden="true">
    <div class="hex-grid"></div>
</div>

<!-- Abejas decorativas -->
<div class="bee-trail" aria-hidden="true">
    <span class="bee bee-1">🐝</span>
    <span class="bee bee-2">🐝</span>
</div>

<div id="main-header"></div>

<main class="book-detail-page">
    <div class="book-detail-inner">
        <div id="bookDetailContainer">
            <!-- Skeleton de carga inicial -->
            <div class="book-detail-skeleton" id="loadingSkeleton">
                <div>
                    <div class="skeleton skeleton-cover"></div>
                </div>
                <div style="padding-top: 0.5rem;">
                    <div class="skeleton skeleton-line" style="width:65%; height:2.5rem; margin-bottom:1rem;"></div>
                    <div class="skeleton skeleton-line" style="width:40%;"></div>
                    <div class="skeleton skeleton-line" style="width:30%; margin-top:0.5rem;"></div>
                    <div class="skeleton skeleton-line" style="width:80%; margin-top:2rem; height:6rem;"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/app.js"></script>
<script src="js/header.js"></script>
<script src="js/bookDetail.js"></script>
</body>
</html>
