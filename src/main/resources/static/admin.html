<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración — BeeRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos específicos para las tablas del panel de control */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; background: var(--navy-card); border-radius: var(--radius-md); overflow: hidden; }
        .admin-table th, .admin-table td { padding: 1.2rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .admin-table th { background: rgba(0,0,0,0.2); font-family: 'Outfit', sans-serif; color: var(--honey); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.85rem; }
        .admin-table td { color: var(--text); font-size: 0.95rem; }
        .admin-table tr:hover { background: rgba(255,255,255,0.02); }
        .uuid-text { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); background: rgba(0,0,0,0.3); padding: 0.3rem; border-radius: 4px; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.3); padding: 0.5rem 1rem; border-radius: var(--radius-pill); cursor: pointer; transition: all 0.2s; }
        .btn-danger:hover:not(:disabled) { background: var(--error); color: #fff; }
        .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="hex-bg" aria-hidden="true"><div class="hex-grid"></div></div>
<div id="main-header"></div>

<main class="admin-page" style="padding-top: 8rem; min-height: 100vh;">
    <div class="results-inner">
        <h1 class="results-title" style="margin-bottom: 2rem;"><i class="fas fa-shield-alt" style="color: var(--honey);"></i> Panel de Control (Admin)</h1>

        <!-- ✅ CONTENEDOR DE MENSAJES (estilo BeeRead) -->
        <div id="messageBox" class="hidden" style="margin-bottom: 1.5rem;"></div>

        <div style="margin-bottom: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
            <button id="exportTopBooksBtn" class="btn-primary" style="background: var(--honey); color: var(--navy-deep); border: none;">
                <i class="fas fa-download"></i> Exportar libros más reseñados (CSV)
            </button>
        </div>

        <div class="search-tabs-container">
            <button id="tabUsers" class="search-tab active"><i class="fas fa-users"></i> Usuarios de la Colmena</button>
            <button id="tabReviews" class="search-tab"><i class="fas fa-comments"></i> Moderación de Reseñas</button>
        </div>

        <section id="adminUsers" class="admin-section">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID Físico (UUID)</th>
                    <th>Avatar & Username</th>
                    <th>Rol</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody id="usersListBody">
                <tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Cargando usuarios...</td></tr>
                </tbody>
            </table>
        </section>

        <section id="adminReviews" class="admin-section hidden">
            <div id="globalReviewsList" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
                <p style="color: var(--text-muted);">Cargando reseñas globales...</p>
            </div>
        </section>
    </div>
</main>

<div id="deleteModal" class="modal hidden">
    <div class="modal-content feature-card" style="max-width: 450px; text-align: center; margin: 10% auto;">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--error); margin-bottom: 1rem;"></i>
        <h2 style="color: var(--text); margin-bottom: 1rem; font-family: 'Fraunces', serif;">Acción Irreversible</h2>
        <p id="deleteModalText" style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">Estás a punto de eliminar este elemento de la base de datos.</p>

        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.5rem;">
            <p style="margin-bottom: 0.5rem; font-size: 0.9rem;">Para confirmar, escribe la palabra <strong style="color: var(--error); letter-spacing: 2px;">BORRAR</strong></p>
            <input type="text" id="confirmDeleteInput" class="form-input" placeholder="Escribe aquí..." style="text-align: center; text-transform: uppercase; border-color: rgba(239, 68, 68, 0.3);">
        </div>

        <div style="display: flex; gap: 1rem;">
            <button class="btn-secondary" onclick="closeDeleteModal()" style="flex: 1; border-color: var(--text-muted); color: var(--text-muted);">Cancelar</button>
            <button id="finalDeleteBtn" class="btn-danger" style="flex: 1; border: none;" disabled>
                <i class="fas fa-trash"></i> Ejecutar
            </button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="js/header.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
