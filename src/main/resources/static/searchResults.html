<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados — BeeRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Fondo hexagonal -->
<div class="hex-bg" aria-hidden="true">
    <div class="hex-grid"></div>
</div>

<!-- Abejas decorativas -->
<div class="bee-trail" aria-hidden="true">
    <span class="bee bee-1">🐝</span>
    <span class="bee bee-2">🐝</span>
</div>

<div id="main-header"></div>

<main class="results-page">
    <div class="results-inner">

        <!-- Cabecera de resultados -->
        <div class="results-header">
            <nav class="breadcrumb" aria-label="Navegación">
                <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
                <i class="fas fa-chevron-right"></i>
                <span>Búsqueda</span>
            </nav>

            <h1 class="results-title">
                Resultados para
                <em id="searchQueryText"></em>
            </h1>
            <p class="results-count hidden" id="resultsCount"></p>

            <!-- Buscador inline para refinar sin volver al inicio -->
            <form class="search-box search-box--compact" id="refineForm">
                <div class="search-input-wrap">
                    <i class="fas fa-search search-icon"></i>
                    <input
                            type="text"
                            class="search-input"
                            id="refineInput"
                            placeholder="Refinar búsqueda…"
                            autocomplete="off"
                            required
                    >
                </div>
                <button type="submit" class="btn-primary btn-search">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </form>
        </div>

        <!-- Grid de resultados -->
        <div id="searchResults" class="books-grid">
            <!-- Los skeleton cards se inyectan desde JS -->
        </div>

    </div>
</main>

<script src="js/app.js"></script>
<script src="js/header.js"></script>
<script src="js/searchResults.js"></script>
</body>
</html>
