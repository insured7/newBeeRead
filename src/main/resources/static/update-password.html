<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña — BeeRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="display: block; background-color: var(--navy-deep); color: var(--text);">

<div class="auth-container" style="max-width: 450px; margin: 80px auto; padding: 2.5rem; background: var(--navy-card); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--navy-light);">

    <div style="text-align: center; margin-bottom: 2rem;">
        <span style="font-size: 3rem;">🍯</span>
        <h2 style="font-family: 'Fraunces'; color: var(--text); font-size: 2rem; margin-top: 0.5rem;">Nueva Contraseña</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem;">Introduce tus nuevas credenciales para acceder a la colmena.</p>
    </div>

    <div id="messageBox" class="hidden" style="padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 500;"></div>

    <form id="updatePasswordForm">
        <div class="form-group" style="margin-bottom: 1.25rem;">
            <label for="newPassword" style="display: block; color: var(--text); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600;">Nueva contraseña</label>
            <div style="position: relative;">
                <input type="password" id="newPassword" required class="input-field" placeholder="Mínimo 6 caracteres" style="width: 100%; padding: 0.8rem 1rem; background: var(--navy-deep); border: 1px solid var(--navy-light); color: var(--text); border-radius: var(--radius-sm); font-family: 'Outfit';">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label for="confirmPassword" style="display: block; color: var(--text); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600;">Confirmar nueva contraseña</label>
            <div style="position: relative;">
                <input type="password" id="confirmPassword" required class="input-field" placeholder="Repite tu contraseña" style="width: 100%; padding: 0.8rem 1rem; background: var(--navy-deep); border: 1px solid var(--navy-light); color: var(--text); border-radius: var(--radius-sm); font-family: 'Outfit';">
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary" style="width: 100%; padding: 1rem; border: none; border-radius: var(--radius-pill); font-weight: 700; cursor: pointer; background: var(--honey); color: var(--navy-deep); transition: all 0.3s ease;">
            Cambiar contraseña
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script src="js/updatePassword.js"></script>
</body>
</html>
