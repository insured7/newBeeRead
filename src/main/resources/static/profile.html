<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil — BeeRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:,"> <!-- Favicon error-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="hex-bg" aria-hidden="true"><div class="hex-grid"></div></div>
<div id="main-header"></div>

<main class="results-page" style="padding-top: 8rem;">
    <div class="results-inner">
        <div id="profileLoading">
            <div class="feature-card skeleton" style="height: 200px; margin-bottom: 3rem;"></div>
        </div>

        <div id="profileContent" class="hidden">
            <section class="feature-card" style="display: flex; gap: 2rem; align-items: center; margin-bottom: 4rem; flex-wrap: wrap;">
                <img id="profileAvatar" src="" alt="Avatar" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--honey); object-fit: cover; box-shadow: var(--shadow-glow);">
                <div style="flex: 1;">
                    <div class="section-label" id="profileUsernameLabel">@usuario</div>
                    <h1 class="results-title" id="profileFullName" style="margin-bottom: 0.5rem; font-size: 2.2rem;"></h1>
                    <p id="profileBio" style="color: var(--text-muted); font-size: 1rem; max-width: 600px; line-height: 1.6;"></p>

                    <div class="profile-stats" style="display: flex; gap: 2rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.08);">
                        <div class="stat-item">
                            <span id="followersCount" style="font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--text);">0</span>
                            <span style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.4rem;">Seguidores</span>
                        </div>
                        <div class="stat-item">
                            <span id="followingCount" style="font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--text);">0</span>
                            <span style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.4rem;">Siguiendo</span>
                        </div>
                    </div>
                </div>


            </section>

            <div style="margin-bottom: 4rem;">
                <h2 class="review-section-title" style="margin-bottom: 1.5rem; font-size: 1.5rem;"><i class="fas fa-heart"></i> Libros Favoritos</h2>
                <div id="favoritesGrid" class="books-grid"></div>
            </div>

            <div>
                <h2 class="review-section-title" style="margin-bottom: 1.5rem; font-size: 1.5rem;"><i class="fas fa-star"></i> Mis Reseñas</h2>
                <div id="reviewsList" style="display: flex; flex-direction: column; gap: 1.5rem;"></div>
            </div>
        </div>
    </div>
</main>

<div id="editProfileModal" class="modal hidden">
    <div class="modal-content feature-card" style="max-width: 500px; margin: 5% auto; position: relative; overflow-y: auto; max-height: 90vh;">
        <button id="closeModal" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; z-index: 10;">&times;</button>

        <h2 class="results-title" style="font-size: 1.8rem; margin-bottom: 1.5rem;">Editar Perfil</h2>

        <form id="editProfileForm">
            <div class="form-group" style="margin-bottom: 1rem;">
                <label class="form-label">Nombre de Usuario <span style="color: var(--text-muted); font-size: 0.8rem;">(Bloqueado)</span></label>
                <input type="text" id="editUsername" class="form-input disabled-input" disabled style="background: rgba(255,255,255,0.02); color: var(--text-muted); cursor: not-allowed;">
            </div>

            <div class="form-group" style="margin-bottom: 1rem;">
                <label class="form-label">Nombre</label>
                <input type="text" id="editFullName" class="form-input">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label class="form-label">Foto de Perfil</label>

                <label for="editAvatarFile" class="btn-ghost" style="display: flex; justify-content: center; cursor: pointer; width: 100%; border: 1px dashed rgba(255,184,0,0.5); background: rgba(255,184,0,0.03);">
                    <i class="fas fa-camera"></i> <span id="fileNameDisplay">Seleccionar imagen desde tu dispositivo...</span>
                </label>
                <input type="file" id="editAvatarFile" class="hidden" accept="image/png, image/jpeg, image/webp">

                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; text-align: center;">Formatos admitidos: JPG, PNG, WEBP. Máx: 2MB.</div>

                <div id="cropperWrapper" class="hidden" style="margin-top: 1rem; border-radius: var(--radius-md); overflow: hidden; border: 1px solid rgba(255,184,0,0.2); background: #000;">
                    <img id="imageToCrop" src="" style="max-width: 100%; display: block;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label class="form-label">Biografía</label>
                <textarea id="editBio" class="form-input" style="height: 80px; resize: none;"></textarea>
            </div>


            <button type="submit" class="btn-primary" style="width: 100%;">
                <i class="fas fa-save"></i> Guardar Cambios
            </button>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

<script src="js/app.js"></script>
<script src="js/header.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
